<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NULL_LINK // CHAT_TERMINAL</title>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Courier New', Courier, monospace; margin: 0; }
        
        /* Terminal Boot Loader */
        #loading-terminal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a; z-index: 9999; display: flex;
            align-items: center; padding: 40px; font-size: 1.2rem;
        }

        /* Rest of your CSS remains the same... */
        nav { width: 100%; background-color: #1a1a1a; border-bottom: 2px solid #ffffff; padding: 15px 0; display: flex; justify-content: center; gap: 30px; position: sticky; top: 0; }
        nav a { color: #ffffff; text-decoration: none; text-transform: uppercase; font-weight: bold; }
        .content-wrap { padding: 40px; }
        .chat-layout { display: flex; max-width: 1200px; margin: 0 auto; gap: 20px; }
        .chat-sidebar { width: 250px; }
        .sidebar-title { text-transform: uppercase; border-bottom: 1px solid #ffffff; padding-bottom: 5px; margin-bottom: 15px; }
        #room-list li { padding: 10px; border: 1px solid #ffffff; background: #ffffff; color: #000000; font-weight: bold; }
        .chat-window { flex: 1; border: 2px solid #ffffff; padding: 10px; }
        iframe { width: 100%; height: 700px; border: none; display: block; filter: invert(0.9) hue-rotate(180deg); }
    </style>
</head>
<body>

    <div id="loading-terminal">
        <div id="console-text"></div>
    </div>

    <nav>
        <a href="index.html">HOME</a>
        <a href="chat.html">CHAT</a>
        <a href="https://github.com/nl-nulllogic/null-link">GITHUB</a>
        <a href="about.html">ABOUT</a>
    </nav>

    <div class="content-wrap">
        <div class="chat-layout">
            <aside class="chat-sidebar">
                <div class="sidebar-title">// CHANNELS</div>
                <ul id="room-list" style="list-style: none; padding: 0;">
                    <li>NULL_LINK</li>
                </ul>
            </aside>
            <main class="chat-window" id="window">
                <div id="title-bar"><h1>NULL_LINK</h1></div>
            </main>
        </div>
    </div>

<script>
    const logs = [
        "Initializing kernel...",
        "Establishing encrypted handshake...",
        "Connecting to IRC_NODE_01...",
        "Authenticating session...",
        "SYSTEM_READY."
    ];

    async function boot() {
        const consoleEl = document.getElementById("console-text");
        for (const line of logs) {
            consoleEl.innerHTML += "> " + line + "<br>";
            await new Promise(r => setTimeout(r, 600)); // Delay between lines
        }
        document.getElementById("loading-terminal").style.display = "none";
        loadChat();
    }

    function loadChat() {
        const windowDiv = document.getElementById("window");
        const newFrame = document.createElement("iframe");
        newFrame.src = "https://web.libera.chat/?channel=#null_link";
        windowDiv.appendChild(newFrame);
    }

    window.onload = boot;
</script>
</body>
</html>
