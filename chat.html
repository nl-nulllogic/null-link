<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL_LINK // CHAT_TERMINAL</title>
    <style>
        /* Terminal Theme */
        body { 
            background-color: #0a0a0a; 
            color: #ffffff; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
        }

        /* Nav Bar */
        nav {
            width: 100%;
            background-color: #1a1a1a;
            border-bottom: 2px solid #ffffff;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            position: sticky;
            top: 0;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover { color: #00ffcc; }

        .content-wrap { padding: 40px; }
        
        .chat-layout { 
            display: flex; 
            max-width: 1200px; 
            margin: 0 auto; 
            gap: 20px; 
        }

        .chat-sidebar { width: 250px; }
        .sidebar-title { 
            text-transform: uppercase; 
            border-bottom: 1px solid #ffffff; 
            padding-bottom: 5px; 
            margin-bottom: 15px; 
        }

        #room-list li { 
            padding: 10px; 
            border: 1px solid #ffffff; 
            background: #ffffff; 
            color: #000000; 
            font-weight: bold;
        }

        .chat-window { flex: 1; border: 2px solid #ffffff; padding: 10px; }
        #title-bar { padding: 10px; border-bottom: 1px solid #ffffff; margin-bottom: 10px; }
        
        iframe { 
            width: 100%; 
            height: 700px; 
            border: none; 
            display: block; 
            filter: invert(0.9) hue-rotate(180deg); 
        }

        @media (max-width: 768px) {
            .chat-layout { flex-direction: column; }
            .chat-sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">HOME</a>
        <a href="chat.html">CHAT</a>
        <a href="https://github.com/nl-nulllogic/null-link">GITHUB</a>
        <a href="about.html">ABOUT</a>
    </nav>

    <div class="content-wrap">
        <div class="chat-layout">
            <aside class="chat-sidebar">
                <div class="sidebar-title">// CHANNELS</div>
                <ul id="room-list" style="list-style: none; padding: 0;">
                    <li>NULL_LINK</li>
                </ul>
            </aside>

            <main class="chat-window">
                <div id="title-bar">
                    <h1>NULL_LINK</h1>
                </div>
                <!-- Iframe injected here -->
            </main>
        </div>
    </div>

<script>
    window.addEventListener("load", () => {
        const windowDiv = document.querySelector(".chat-window");
        const newFrame = document.createElement("iframe");
        newFrame.id = "irc-frame";
        newFrame.src = "https://web.libera.chat/?channel=#null_link";
        windowDiv.appendChild(newFrame);
    });
</script>

</body>
</html>
